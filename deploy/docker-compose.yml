services:
  server:
    # Pull the prebuilt image: `docker compose pull && docker compose up -d`.
    # Or build from source instead: `docker compose up -d --build`.
    image: ghcr.io/jangjunha/malguem/server:latest
    build: ../server
    restart: unless-stopped
    environment:
      MALGUEM_DB: /data/malguem.sqlite3
      MALGUEM_BIND: 0.0.0.0:8787
      MALGUEM_TURN_SECRET: ${TURN_SECRET}
      MALGUEM_TURN_URLS: turn:${DOMAIN}:3478?transport=udp,turn:${DOMAIN}:3478?transport=tcp
    volumes:
      - malguem-data:/data

  # TURN relay: a last-resort path for peers behind CGNAT/symmetric NAT.
  # It relays already-encrypted SRTP and cannot read media (docs/CRYPTO.md).
  # host networking keeps the relay port range simple.
  coturn:
    image: coturn/coturn:4
    restart: unless-stopped
    network_mode: host
    command: >-
      --fingerprint
      --use-auth-secret
      --static-auth-secret=${TURN_SECRET}
      --realm=${DOMAIN}
      --listening-port=3478
      --min-port=49160
      --max-port=49200

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  malguem-data:
  caddy-data:
  caddy-config:
